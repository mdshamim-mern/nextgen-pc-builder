version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pc_builder_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pc_builder
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: pc_builder_api
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/pc_builder?schema=public"
      NODE_ENV: "production"
      PORT: 5000
      JWT_ACCESS_SECRET: "your-super-secret-access-token"
      JWT_REFRESH_SECRET: "your-super-secret-refresh-token"
      JWT_ACCESS_EXPIRES_IN: "1d"
      JWT_REFRESH_EXPIRES_IN: "7d"
      BCRYPT_SALT_ROUNDS: 12
    depends_on:
      - db

volumes:
  postgres_data: